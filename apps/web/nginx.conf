# Frontend container: serve the built React bundle and reverse-proxy /api/*
# to the FastAPI service over the compose network. Tuned for SSE so streamed
# tokens reach the browser immediately (no buffering, no caching, long
# read/send timeouts).

server {
    listen 80;
    server_name _;

    # Reasonable defaults
    client_max_body_size 5m;
    server_tokens off;

    # Gzip text assets (do not gzip the proxied /api stream).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed Vite assets aggressively.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # SPA fallback — unknown routes fall back to index.html so the React
    # client can render them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + SSE proxy. The trailing slash on both `location` and `proxy_pass`
    # strips the `/api` prefix, matching the dev-mode Vite rewrite.
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_set_header   Authorization     $http_authorization;

        # SSE essentials: ship every chunk through as it arrives.
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        3600s;
        proxy_send_timeout        3600s;
        chunked_transfer_encoding on;
    }
}
